<!doctype html>
<html lang="en">

<head>
    <title>Register - Book Store</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="Home.html"><img
                    src="https://images.rawpixel.com/image_png_social_landscape/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDI0LTEyL3Jhd3BpeGVsb2ZmaWNlOV9yZXRyb19sb2dvX2Ffb3Blbl9ib29rX2JsYWNrX2FuZF93aGl0ZV9ub19zcGxhc180YjJlZGVmOC1lMWQwLTRiNzUtODhhMi1hZWY4N2JiZjlkN2IucG5n.png"
                    alt="Book Logo" width="50" height="50" class="me-2 rounded-circle">Book Store</a>
        </div>
    </nav>

    <!-- Registration Form -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow">
                    <h3 class="text-primary text-center mb-4">Register</h3>

                    <form>
                        <input type="text" class="form-control mb-3" placeholder="Full Name" required>

                        <input type="text" class="form-control mb-3" placeholder="Username" required>

                        <input type="number" class="form-control mb-3" placeholder="Mobile Number" required>

                        <input type="email" class="form-control mb-3" placeholder="Email" required>

                        <div class="mb-3">
                            <label class="form-label">City</label>
                            <select class="form-select" required>
                                <option selected disabled>Select city</option>
                                <option>New Delhi</option>
                                <option>Istanbul</option>
                                <option>Jakarta</option>
                            </select>
                        </div>

                        <input type="password" class="form-control mb-3" placeholder="Password" required>

                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>

                    <p class="text-center mt-3">
                        Already have an account? <a href="Login.html">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-primary text-white text-center py-3">
        &copy; 2025 Book Store
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
